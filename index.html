<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tantea — Documentos legales</title>
  <style>
    :root {
      --bg: #0F2018;
      --surface: #1F3A2E;
      --accent: #D4A24C;
      --text: #F5F1E8;
      --text-muted: #9DB5A6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.6;
    }
    .card {
      background: var(--surface);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }
    h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
      color: var(--accent);
    }
    .tagline {
      color: var(--text-muted);
      margin-bottom: 32px;
      font-size: 15px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .link {
      display: block;
      padding: 16px 20px;
      background: var(--bg);
      border-radius: 12px;
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
    }
    .link:hover {
      background: rgba(212, 162, 76, 0.15);
    }
    .link .label {
      display: block;
      color: var(--text);
      font-size: 16px;
    }
    .link .desc {
      display: block;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 400;
      margin-top: 4px;
    }
    footer {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid rgba(245, 241, 232, 0.1);
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Tantea</h1>
    <p class="tagline">Tira la foto, yo cuento.</p>

    <div class="links">
      <a class="link" href="privacy.html">
        <span class="label">Política de Privacidad</span>
        <span class="desc">Qué datos recolectamos y cómo los usamos · Español</span>
      </a>
      <a class="link" href="privacy-en.html">
        <span class="label">Privacy Policy</span>
        <span class="desc">What data we collect and how we use it · English</span>
      </a>
      <a class="link" href="terms.html">
        <span class="label">Términos de Servicio</span>
        <span class="desc">Condiciones de uso de la app</span>
      </a>
    </div>

    <footer>
      Knowell Technology · República Dominicana
    </footer>
  </div>
</body>
</html>
